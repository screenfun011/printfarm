services:
  postgres:
    image: postgres:16-alpine
    container_name: printfarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: printfarm
      POSTGRES_PASSWORD: printfarm
      POSTGRES_DB: printfarm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U printfarm']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: printfarm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: printfarm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: printfarm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/printfarm &&
        mc anonymous set download local/printfarm
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: printfarm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DEPLOYMENT_MODE: cloud
      DATABASE_URL: postgresql://printfarm:printfarm@postgres:5432/printfarm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-minimum-32-characters-long
      JWT_ADMIN_SECRET: dev-admin-secret-minimum-32-characters-long
      CORS_ORIGINS: http://localhost:5173
      S3_BUCKET: printfarm
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      MAX_FILE_SIZE_MB: 200
      # Stripe — popuniti za billing
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      # Resend — popuniti za email
      RESEND_API_KEY: re_placeholder
    env_file:
      - path: .env.local
        required: false

volumes:
  postgres_data:
  redis_data:
  minio_data:
